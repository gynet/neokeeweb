<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <g fill="currentColor">
<!-- bow as donut (outer minus inner via even-odd fill) -->
<path fill-rule="evenodd" d="
  M 256 88
  a 104 104 0 1 0 0 208
  a 104 104 0 1 0 0 -208
  Z
  M 256 130
  a 62 62 0 1 1 0 124
  a 62 62 0 1 1 0 -124
  Z
"/>
<!-- X flourish: two crossed bars rotated 45° around (256,192) -->
<g transform="translate(256 192) rotate(45)">
  <rect x="-44" y="-13" width="88" height="26" rx="6"/>
  <rect x="-13" y="-44" width="26" height="88" rx="6"/>
</g>
<!-- shaft -->
<rect x="241" y="300" width="30" height="178" rx="6"/>
<!-- teeth (right side, tip area) -->
<rect x="271" y="380" width="58" height="32" rx="6"/>
<rect x="271" y="424" width="44" height="32" rx="6"/>
</g>
</svg>
