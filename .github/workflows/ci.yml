name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run test
      - run: bun run build || true

  e2e-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: cd packages/extension && bun add -d ts-node && bun run build-chrome
      - run: cd packages/extension && bunx playwright install chromium --with-deps
      - run: cd packages/extension && bunx playwright test --config playwright.config.ts || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-extension-report
          path: |
            packages/extension/test-results/
            packages/extension/playwright-report/
          retention-days: 7
