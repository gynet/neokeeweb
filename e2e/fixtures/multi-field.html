<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Registration Page</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f5f5f5; }
        .register-container { background: #fff; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); width: 100%; max-width: 480px; }
        h1 { margin-bottom: 1.5rem; font-size: 1.5rem; color: #333; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.25rem; font-size: 0.875rem; color: #555; }
        input { width: 100%; padding: 0.5rem 0.75rem; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; }
        input:focus { outline: none; border-color: #6386ec; box-shadow: 0 0 0 2px rgba(99,134,236,0.2); }
        .totp-group { display: flex; gap: 0.5rem; align-items: flex-end; }
        .totp-group input { flex: 1; letter-spacing: 0.5em; text-align: center; font-family: monospace; font-size: 1.25rem; }
        .checkbox-group { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; }
        .checkbox-group input { width: auto; }
        button { width: 100%; padding: 0.75rem; background: #6386ec; color: #fff; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; margin-top: 0.5rem; }
        button:hover { background: #4f6fd0; }
        .status { margin-top: 1rem; padding: 0.5rem; border-radius: 4px; display: none; }
        .status.success { display: block; background: #d4edda; color: #155724; }
        .status.error { display: block; background: #f8d7da; color: #721c24; }
        .field-hint { font-size: 0.75rem; color: #888; margin-top: 0.25rem; }
    </style>
</head>
<body>
    <div class="register-container">
        <h1>Create Account</h1>
        <form id="register-form" action="/register" method="POST">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" name="email" id="email" placeholder="you@example.com" autocomplete="email" />
            </div>
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" name="username" id="username" placeholder="Choose a username" autocomplete="username" />
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" placeholder="Create a password" autocomplete="new-password" />
                <div class="field-hint">At least 8 characters</div>
            </div>
            <div class="form-group">
                <label for="password-confirm">Confirm Password</label>
                <input type="password" name="password-confirm" id="password-confirm" placeholder="Re-enter password" autocomplete="new-password" />
            </div>
            <div class="form-group">
                <label for="totp">Two-Factor Code (TOTP)</label>
                <div class="totp-group">
                    <input type="text" name="totp" id="totp" placeholder="000000" maxlength="6" inputmode="numeric" pattern="[0-9]{6}" autocomplete="one-time-code" />
                </div>
                <div class="field-hint">Enter the 6-digit code from your authenticator app</div>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" name="remember" id="remember" />
                <label for="remember">Remember this device</label>
            </div>
            <button type="submit" id="submit-btn">Create Account</button>
        </form>
        <div id="status" class="status"></div>
    </div>
    <script>
        document.getElementById('register-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const status = document.getElementById('status');
            const email = document.getElementById('email').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('password-confirm').value;
            const totp = document.getElementById('totp').value;

            const errors = [];
            if (!email) errors.push('Email is required');
            if (!username) errors.push('Username is required');
            if (!password) errors.push('Password is required');
            if (password !== confirm) errors.push('Passwords do not match');
            if (totp && totp.length !== 6) errors.push('TOTP code must be 6 digits');

            if (errors.length > 0) {
                status.className = 'status error';
                status.textContent = errors.join('. ') + '.';
            } else {
                status.className = 'status success';
                status.textContent = 'Account created for: ' + username + ' (' + email + ')';
            }
        });
    </script>
</body>
</html>
